<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Jour 05 - Connexion</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Jour 05</h1>
        <nav>
            <a href="inscription.html">Inscription</a>
            <a href="connexion.html" class="active">Connexion</a>
        </nav>
    </header>

    <div id="recap-erreurs"></div>

    <main>
        <form id="form-connexion" novalidate>
            <div class="champ">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
                <small class="erreur" data-pour="email"></small>
            </div>

            <div class="champ">
                <label for="password">Password</label>
                <input type="password" id="password" name="password">
                <small class="erreur" data-pour="password"></small>
            </div>

            <div class="actions">
                <button type="submit" id="btn-connexion">Se connecter</button>
            </div>
        </form>
    </main>
</body>
</html>
